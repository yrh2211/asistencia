<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#378ADD">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistencia DAMUR">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23378ADD' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='700' fill='%23fff' text-anchor='middle' dominant-baseline='central'>A</text></svg>">
<title>Asistencia DAMUR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; -webkit-user-select: none; user-select: none; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

.container { width: 100%; height: 100vh; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

.header { background: linear-gradient(135deg, #378ADD 0%, #2563a0 100%); color: white; padding: 2rem 1.5rem; text-align: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.header h1 { font-size: 18px; font-weight: 400; letter-spacing: 0.5px; margin: 0; opacity: 0.95; }
.header p { font-size: 12px; margin: 6px 0 0; opacity: 0.85; letter-spacing: 0.3px; font-weight: 300; }
.header .time { font-size: 60px; font-weight: 700; margin: 20px 0 0; font-family: 'Courier New', monospace; letter-spacing: 2px; line-height: 1; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.header .date { font-size: 12px; margin-top: 14px; opacity: 0.85; letter-spacing: 0.5px; font-weight: 300; }

.content { flex: 1; padding: 1.5rem 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; appearance: none; }
.form-group input:focus { outline: none; border-color: #378ADD; background: #f0f7ff; }

.button-group { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.button-group button { flex: 1; padding: 14px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #333; }
.button-group button:active { transform: scale(0.98); }
.button-group button.primary { background: #378ADD; color: white; border-color: #378ADD; }
.button-group button.primary:active { opacity: 0.9; }

#cameraContainer { display: none; margin-bottom: 1.5rem; text-align: center; }
#cameraContainer.show { display: block; }
#video { width: 100%; border-radius: 12px; background: #000; max-height: 400px; }
#canvas { display: none; }

.camera-controls { display: flex; gap: 8px; margin-top: 12px; }
.camera-controls button { flex: 1; }

.photo-preview { width: 100%; border-radius: 12px; max-height: 300px; margin-bottom: 12px; }

.status { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 1.5rem; display: none; }
.status.success { background: #d4edda; color: #155724; display: block; border: 1px solid #c3e6cb; }
.status.error { background: #f8d7da; color: #721c24; display: block; border: 1px solid #f5c6cb; }
.status.info { background: #d1ecf1; color: #0c5460; display: block; border: 1px solid #bee5eb; }

.records { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #ddd; }
.records h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #333; }
.record-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; border: 1px solid #eee; }
.record-item .cedula { font-weight: 600; color: #333; }
.record-item .time { color: #666; font-size: 12px; margin-top: 4px; }
.record-item .actions { margin-top: 8px; display: flex; gap: 6px; }
.record-item .actions button { flex: 1; padding: 6px; font-size: 11px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; color: #d32f2f; }
.record-item .actions button:active { background: #ffebee; }

.export-btn { width: 100%; padding: 14px; background: #4caf50; color: white; border: 1px solid #4caf50; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 12px; font-size: 14px; }
.export-btn:active { opacity: 0.9; }

.empty { text-align: center; color: #999; font-size: 13px; padding: 2rem 0; }

.install-banner { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 12px; border: 1px solid #ffeaa7; }
.install-banner.show { display: block; }
.install-banner button { padding: 8px 12px; background: #856404; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 8px; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Control de Asistencia</h1>
    <p>DAMUR CONSTRUCTORA S.A.S.</p>
    <div class="time" id="currentTime">00:00:00</div>
    <div class="date" id="currentDate"></div>
  </div>

  <div class="content">
    <div id="installBanner" class="install-banner">
      <p>📱 Instalar como app en tu celular</p>
      <button id="installBtn">Instalar ahora</button>
    </div>

    <div id="status" class="status"></div>

    <div class="form-group">
      <label>Número de Cédula</label>
      <input type="text" id="cedula" placeholder="Ej: 1088345762" maxlength="20" autocomplete="off" inputmode="numeric">
    </div>

    <div class="button-group">
      <button id="startCameraBtn" class="primary">Abrir Cámara</button>
      <button id="clearBtn">Limpiar</button>
    </div>

    <div id="cameraContainer">
      <video id="video" playsinline autoplay muted></video>
      <div class="camera-controls">
        <button id="captureBtn" class="primary">Capturar Foto</button>
        <button id="closeCameraBtn">Cerrar</button>
      </div>
      <canvas id="canvas"></canvas>
      <img id="photoPreview" class="photo-preview" style="display:none;">
    </div>

    <div id="checkInBtn" style="display: none;">
      <button style="width: 100%; padding: 14px; background: #4caf50; color: white; border: 1px solid #4caf50; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;" id="submitBtn">Registrar Asistencia</button>
    </div>

    <div class="records">
      <h2>Registro de Asistencia</h2>
      <div id="recordsList"></div>
      <button id="exportBtn" class="export-btn" style="display: none;">⬇️ Exportar a Excel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<script src="app.js"></script>
</body>
</html>
